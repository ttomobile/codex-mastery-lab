name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    name: lint typecheck test build e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
      - name: Node.js を設定
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: 依存関係をインストール
        run: npm ci
      - name: Playwright ブラウザをインストール
        run: npx playwright install --with-deps
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit / Component Test
        run: npm test
      - name: Build
        run: npm run build
      - name: E2E
        run: npm run test:e2e
      - name: Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
      - name: Test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
