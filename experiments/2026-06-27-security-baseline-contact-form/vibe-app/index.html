<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NorthstarOps デモ依頼</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">NorthstarOps</p>
          <h1 id="page-title">SaaS業務フローのデモを予約する</h1>
          <p class="lede">
            営業、サポート、導入支援のチームが、顧客対応の引き継ぎを一つの画面で整理できることを確認します。
          </p>
          <div class="proof-grid" aria-label="プロダクトの特徴">
            <div>
              <strong>42%</strong>
              <span>導入サイクルを短縮</span>
            </div>
            <div>
              <strong>18k</strong>
              <span>顧客ワークフローを可視化</span>
            </div>
            <div>
              <strong>99.9%</strong>
              <span>稼働率目標</span>
            </div>
          </div>
        </div>

        <form class="contact-form" id="lead-form">
          <div class="form-heading">
            <p class="eyebrow">デモ依頼</p>
            <h2>相談したい内容を入力してください</h2>
          </div>

          <label>
            <span>氏名</span>
            <input id="name" name="name" type="text" autocomplete="name" required placeholder="山田 太郎">
          </label>

          <label>
            <span>メールアドレス</span>
            <input id="email" name="email" type="email" autocomplete="email" required placeholder="taro@example.com">
          </label>

          <div class="split-fields">
            <label>
              <span>会社規模</span>
              <select id="company-size" name="companySize" required>
                <option value="">会社規模を選択</option>
                <option>1〜25名</option>
                <option>26〜100名</option>
                <option>101〜500名</option>
                <option>501〜2,000名</option>
                <option>2,001名以上</option>
              </select>
            </label>

            <label>
              <span>予算</span>
              <select id="budget" name="budget" required>
                <option value="">予算を選択</option>
                <option>月10万円未満</option>
                <option>月10万〜25万円</option>
                <option>月25万〜75万円</option>
                <option>月75万円以上</option>
              </select>
            </label>
          </div>

          <label>
            <span>相談内容</span>
            <textarea id="message" name="message" rows="5" required placeholder="例: AI開発プロセスの標準化について相談したいです。"></textarea>
          </label>

          <button type="submit">入力内容をプレビュー</button>
          <p class="form-note">この静的デモでは、入力内容はこのブラウザ画面内だけに一時保持されます。</p>
        </form>
      </section>

      <section class="submissions" aria-labelledby="submissions-title">
        <div>
          <p class="eyebrow">最近の入力プレビュー</p>
          <h2 id="submissions-title">問い合わせプレビュー</h2>
        </div>
        <div id="empty-state" class="empty-state">
          送信前プレビューがここに表示されます。
        </div>
        <div id="submission-list" class="submission-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
