<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NorthstarOps デモ依頼</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">NorthstarOps</p>
          <h1 id="page-title">SaaS業務フローのデモを予約する</h1>
          <p class="lede">
            営業、サポート、導入支援のチームが、顧客対応の引き継ぎを一つの画面で整理できることを確認します。
          </p>
          <div class="proof-grid" aria-label="プロダクトの特徴">
            <div>
              <strong>42%</strong>
              <span>導入サイクルを短縮</span>
            </div>
            <div>
              <strong>18k</strong>
              <span>顧客ワークフローを可視化</span>
            </div>
            <div>
              <strong>99.9%</strong>
              <span>稼働率目標</span>
            </div>
          </div>
        </div>

        <form
          class="contact-form"
          id="lead-form"
          data-static-demo="true"
          aria-describedby="privacy-retention-note"
        >
          <div class="form-heading">
            <p class="eyebrow">デモ依頼</p>
            <h2>相談したい内容を入力してください</h2>
          </div>

          <label for="name">氏名</label>
          <input
            id="name"
            name="name"
            type="text"
            autocomplete="name"
            maxlength="80"
            required
            data-classification="pii.name"
            aria-describedby="privacy-retention-note"
            placeholder="山田 太郎"
          >

          <label for="email">メールアドレス</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            maxlength="120"
            required
            data-classification="pii.email"
            aria-describedby="privacy-retention-note"
            placeholder="taro@example.com"
          >

          <div class="split-fields">
            <div class="field-group">
              <label for="company-size">会社規模</label>
              <select
                id="company-size"
                name="companySize"
                required
                data-classification="business.company_size"
                aria-describedby="privacy-retention-note"
              >
                <option value="">会社規模を選択</option>
                <option value="1-25">1〜25名</option>
                <option value="26-100">26〜100名</option>
                <option value="101-500">101〜500名</option>
                <option value="501-2000">501〜2,000名</option>
                <option value="2001-plus">2,001名以上</option>
              </select>
            </div>

            <div class="field-group">
              <label for="budget">予算</label>
              <select
                id="budget"
                name="budget"
                required
                data-classification="business.budget"
                aria-describedby="privacy-retention-note"
              >
                <option value="">予算を選択</option>
                <option value="under-10k">月10万円未満</option>
                <option value="10k-25k">月10万〜25万円</option>
                <option value="25k-75k">月25万〜75万円</option>
                <option value="75k-plus">月75万円以上</option>
              </select>
            </div>
          </div>

          <label for="message">相談内容</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            maxlength="600"
            required
            data-classification="pii_or_confidential.free_text"
            aria-describedby="privacy-retention-note"
            placeholder="例: AI開発プロセスの標準化について相談したいです。"
          ></textarea>

          <label class="consent-field" for="privacy-consent">
            <input
              id="privacy-consent"
              name="privacyConsent"
              type="checkbox"
              required
              aria-describedby="privacy-retention-note"
            >
            <span>このプレビューでは、入力内容が画面更新までメモリ上にだけ保持されることを理解しました。</span>
          </label>

          <button type="submit">入力内容をプレビュー</button>
          <p class="form-note" id="privacy-retention-note">
            ネットワーク送信は行いません。この静的プレビューは入力内容をメモリ上にだけ保持し、画面更新で消去します。
          </p>
        </form>
      </section>

      <section class="submissions" aria-labelledby="submissions-title">
        <div>
          <p class="eyebrow">最近の入力プレビュー</p>
          <h2 id="submissions-title">問い合わせプレビュー</h2>
        </div>
        <div id="empty-state" class="empty-state">
          送信前プレビューがここに表示されます。
        </div>
        <div id="submission-list" class="submission-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
