<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Accessibility Contract reverse chain</title>
  <desc id="desc">A diagram showing how defects in a vibe-coded FAQ app are converted into upstream AIDD-Spec fields.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">欠陥から逆算する Accessibility Contract</text>
  <text x="60" y="110" font-family="Arial, sans-serif" font-size="18" fill="#475569">雑なFAQ検索アプリの監査結果 → 理想状態 → 修正指示 → AI Task Packet → AIDD-Spec</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="60" y="170" width="200" height="145" rx="16" fill="#fee2e2" stroke="#ef4444"/>
    <text x="84" y="205" font-size="20" font-weight="700" fill="#7f1d1d">Finding</text>
    <text x="84" y="238" font-size="15" fill="#7f1d1d">• list semanticsなし</text>
    <text x="84" y="263" font-size="15" fill="#7f1d1d">• aria-controlsなし</text>
    <text x="84" y="288" font-size="15" fill="#7f1d1d">• Enterでreload可能</text>

    <line x1="270" y1="242" x2="345" y2="242" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="360" y="170" width="205" height="145" rx="16" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="384" y="205" font-size="20" font-weight="700" fill="#164e63">Ideal State</text>
    <text x="384" y="238" font-size="15" fill="#164e63">検索欄・結果・FAQが</text>
    <text x="384" y="263" font-size="15" fill="#164e63">支援技術から関係性</text>
    <text x="384" y="288" font-size="15" fill="#164e63">として読める</text>

    <line x1="575" y1="242" x2="650" y2="242" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="665" y="170" width="205" height="145" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="689" y="205" font-size="20" font-weight="700" fill="#78350f">Fix Instruction</text>
    <text x="689" y="238" font-size="15" fill="#78350f">aria-describedby</text>
    <text x="689" y="263" font-size="15" fill="#78350f">ul/li + button</text>
    <text x="689" y="288" font-size="15" fill="#78350f">preventDefault</text>

    <line x1="880" y1="242" x2="955" y2="242" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="970" y="170" width="180" height="145" rx="16" fill="#dcfce7" stroke="#22c55e"/>
    <text x="994" y="205" font-size="20" font-weight="700" fill="#14532d">Upstream</text>
    <text x="994" y="238" font-size="15" fill="#14532d">Accessibility Contract</text>
    <text x="994" y="263" font-size="15" fill="#14532d">State Design</text>
    <text x="994" y="288" font-size="15" fill="#14532d">Verification Evidence</text>

    <rect x="190" y="405" width="820" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="230" y="445" font-size="22" font-weight="700" fill="#0f172a">AIDD-Specへの更新</text>
    <text x="230" y="482" font-size="17" fill="#334155">AI Task Packetに「画面状態」「支援技術との関係」「検証コマンド」を必須フィールドとして追加。</text>
    <text x="230" y="516" font-size="17" fill="#334155">SaaS化するなら、入力フォームからアクセシビリティ契約を生成し、静的監査を自動実行する。</text>
  </g>
</svg>
