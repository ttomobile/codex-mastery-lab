  <rect x="70" y="850" width="1260" height="44" rx="22" fill="#eff6ff"/>
  <text x="100" y="879" fill="#1d4ed8" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="18" font-weight="700">終了条件: 100点に到達する、または100回試行する。毎回、失点をAI Task PacketとAIDD-Specに戻す。</text>
