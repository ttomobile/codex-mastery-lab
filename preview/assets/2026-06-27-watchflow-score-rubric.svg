    <line x1="100" y1="235" x2="1300" y2="235" stroke="#cbd5e1"/>
    <g stroke="#e2e8f0"><line x1="100" y1="292" x2="1300" y2="292"/><line x1="100" y1="342" x2="1300" y2="342"/><line x1="100" y1="392" x2="1300" y2="392"/><line x1="100" y1="442" x2="1300" y2="442"/><line x1="100" y1="492" x2="1300" y2="492"/><line x1="100" y1="542" x2="1300" y2="542"/><line x1="100" y1="592" x2="1300" y2="592"/><line x1="100" y1="642" x2="1300" y2="642"/><line x1="100" y1="692" x2="1300" y2="692"/><line x1="100" y1="742" x2="1300" y2="742"/></g>
