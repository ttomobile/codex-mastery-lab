<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="60" y="78" fill="#eff6ff" font-family="Arial, Hiragino Sans, sans-serif" font-size="38" font-weight="800">Codex Mastery Lab</text>
  <text x="60" y="118" fill="#bfdbfe" font-family="Arial, Hiragino Sans, sans-serif" font-size="21">AIに渡す「共通説明書」を、失敗と検証から作る連載ロードマップ</text>

  <g filter="url(#shadow)" font-family="Arial, Hiragino Sans, sans-serif">
    <rect x="70" y="190" width="180" height="105" rx="18" fill="#dbeafe"/>
    <text x="160" y="226" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">1. 雑に作る</text>
    <text x="160" y="256" text-anchor="middle" fill="#334155" font-size="14">日本語プロンプト</text>
    <text x="160" y="278" text-anchor="middle" fill="#334155" font-size="14">バイブ版</text>

    <rect x="295" y="190" width="180" height="105" rx="18" fill="#dcfce7"/>
    <text x="385" y="226" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">2. 操作する</text>
    <text x="385" y="256" text-anchor="middle" fill="#334155" font-size="14">ブラウザ確認</text>
    <text x="385" y="278" text-anchor="middle" fill="#334155" font-size="14">GIFで記録</text>

    <rect x="520" y="190" width="180" height="105" rx="18" fill="#fef3c7"/>
    <text x="610" y="226" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">3. 監査する</text>
    <text x="610" y="256" text-anchor="middle" fill="#334155" font-size="14">品質・安全性</text>
    <text x="610" y="278" text-anchor="middle" fill="#334155" font-size="14">使いやすさ</text>

    <rect x="745" y="190" width="180" height="105" rx="18" fill="#fae8ff"/>
    <text x="835" y="226" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">4. 逆算する</text>
    <text x="835" y="256" text-anchor="middle" fill="#334155" font-size="14">何を先に</text>
    <text x="835" y="278" text-anchor="middle" fill="#334155" font-size="14">伝えるべきか</text>

    <rect x="970" y="190" width="180" height="105" rx="18" fill="#fee2e2"/>
    <text x="1060" y="226" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">5. 標準化</text>
    <text x="1060" y="256" text-anchor="middle" fill="#334155" font-size="14">AIDD-Spec</text>
    <text x="1060" y="278" text-anchor="middle" fill="#334155" font-size="14">記事・SaaSへ</text>
  </g>

  <g stroke="#93c5fd" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/></marker></defs>
    <path d="M250 242 H290"/><path d="M475 242 H515"/><path d="M700 242 H740"/><path d="M925 242 H965"/>
    <path d="M1060 300 C1060 440 160 440 160 302" stroke="#60a5fa"/>
  </g>

  <rect x="95" y="405" width="1010" height="145" rx="24" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/>
  <text x="130" y="452" fill="#e2e8f0" font-family="Arial, Hiragino Sans, sans-serif" font-size="24" font-weight="700">この連載で増やしていくもの</text>
  <text x="130" y="492" fill="#cbd5e1" font-family="Arial, Hiragino Sans, sans-serif" font-size="18">Accessibility Contract / Performance Budget / Security Baseline / API Operations Contract</text>
  <text x="130" y="526" fill="#cbd5e1" font-family="Arial, Hiragino Sans, sans-serif" font-size="18">AI Task Packet / Verification Evidence / Learning Log / AIDD Control Plane</text>
</svg>
