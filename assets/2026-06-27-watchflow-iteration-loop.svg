<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" rx="32" fill="#f8fafc"/>
  <text x="70" y="80" fill="#0f172a" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="38" font-weight="800">WatchFlow 100点チャレンジの試行ループ</text>
  <text x="70" y="120" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif" font-size="20">雑プロンプトから始め、失点をAIDD-Specへ戻し、100点または100試行まで続ける</text>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 Z" fill="#2563eb"/></marker>
  </defs>
  <g font-family="-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif">
    <g transform="translate(90 200)"><rect width="250" height="130" rx="24" fill="#dbeafe" stroke="#60a5fa"/><text x="28" y="54" font-size="24" font-weight="800" fill="#1e3a8a">1. 雑に作る</text><text x="28" y="88" font-size="17" fill="#1e40af">日本語プロンプトで</text><text x="28" y="112" font-size="17" fill="#1e40af">Next.jsアプリ生成</text></g>
    <g transform="translate(410 200)"><rect width="250" height="130" rx="24" fill="#ede9fe" stroke="#a78bfa"/><text x="28" y="54" font-size="24" font-weight="800" fill="#4c1d95">2. 操作する</text><text x="28" y="88" font-size="17" fill="#5b21b6">ブラウザGIF</text><text x="28" y="112" font-size="17" fill="#5b21b6">スクショ・動画</text></g>
    <g transform="translate(730 200)"><rect width="250" height="130" rx="24" fill="#dcfce7" stroke="#86efac"/><text x="28" y="54" font-size="24" font-weight="800" fill="#14532d">3. 採点する</text><text x="28" y="88" font-size="17" fill="#166534">E2E / Unit</text><text x="28" y="112" font-size="17" fill="#166534">Visual / CI</text></g>
    <g transform="translate(1050 200)"><rect width="250" height="130" rx="24" fill="#ffedd5" stroke="#fdba74"/><text x="28" y="54" font-size="24" font-weight="800" fill="#7c2d12">4. 失点を見る</text><text x="28" y="88" font-size="17" fill="#9a3412">本物・基準との</text><text x="28" y="112" font-size="17" fill="#9a3412">乖離を分類</text></g>
    <path d="M350 265 H395" stroke="#2563eb" stroke-width="8" marker-end="url(#arrow)"/>
    <path d="M670 265 H715" stroke="#2563eb" stroke-width="8" marker-end="url(#arrow)"/>
    <path d="M990 265 H1035" stroke="#2563eb" stroke-width="8" marker-end="url(#arrow)"/>
    <g transform="translate(250 480)"><rect width="310" height="140" rx="24" fill="#fee2e2" stroke="#fca5a5"/><text x="28" y="54" font-size="24" font-weight="800" fill="#7f1d1d">5. ルール化</text><text x="28" y="90" font-size="17" fill="#991b1b">AI Task Packet</text><text x="28" y="114" font-size="17" fill="#991b1b">AIDD-Specを更新</text></g>
    <g transform="translate(720 480)"><rect width="310" height="140" rx="24" fill="#e0f2fe" stroke="#7dd3fc"/><text x="28" y="54" font-size="24" font-weight="800" fill="#075985">6. 再実行</text><text x="28" y="90" font-size="17" fill="#0369a1">同じルーブリックで</text><text x="28" y="114" font-size="17" fill="#0369a1">改善幅を見る</text></g>
    <path d="M1160 340 C1160 430, 890 430, 890 465" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
    <path d="M710 550 H580" stroke="#2563eb" stroke-width="8" marker-end="url(#arrow)"/>
    <path d="M250 550 C70 550, 70 270, 78 270" stroke="#2563eb" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  </g>
</svg>
