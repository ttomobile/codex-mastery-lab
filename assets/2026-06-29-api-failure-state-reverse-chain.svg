<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">API Failure State reverse chain</title>
  <desc id="desc">API失敗状態の欠陥からAI Task Packetへ逆算する流れ</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;fill:#172033} .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18} .head{font-weight:700;font-size:18px}.body{font-size:14px;fill:#475569}.arrow{stroke:#2563eb;stroke-width:3;marker-end:url(#m)}
  </style>
  <defs><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#2563eb"/></marker></defs>
  <rect width="960" height="360" fill="#f8fafc"/>
  <rect class="box" x="30" y="90" width="190" height="150"/>
  <text class="head" x="55" y="130">監査で見つけた欠陥</text>
  <text class="body" x="55" y="165">offline / timeout</text>
  <text class="body" x="55" y="190">server error / retry</text>
  <text class="body" x="55" y="215">証拠ファイルなし</text>
  <line class="arrow" x1="230" y1="165" x2="300" y2="165"/>
  <rect class="box" x="310" y="90" width="190" height="150"/>
  <text class="head" x="335" y="130">理想状態</text>
  <text class="body" x="335" y="165">API境界を分離</text>
  <text class="body" x="335" y="190">失敗状態を操作可能</text>
  <text class="body" x="335" y="215">入力と既存データ保持</text>
  <line class="arrow" x1="510" y1="165" x2="580" y2="165"/>
  <rect class="box" x="590" y="90" width="190" height="150"/>
  <text class="head" x="615" y="130">前工程へ逆算</text>
  <text class="body" x="615" y="165">API Failure Contract</text>
  <text class="body" x="615" y="190">State Design</text>
  <text class="body" x="615" y="215">Verification Evidence</text>
  <line class="arrow" x1="790" y1="165" x2="840" y2="165"/>
  <rect class="box" x="800" y="250" width="130" height="70"/>
  <text class="head" x="820" y="285">AIDD-Spec</text>
  <text class="body" x="820" y="306">v0.6へ反映</text>
</svg>
